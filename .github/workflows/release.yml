name: Release

# Builds mux CLI and mux-agent cross-compiled binaries on version tags.
# Artifacts are uploaded to GitHub Releases.
#
# mux-agent targets:
#   x86_64-unknown-linux-musl  → dist/mux-agent-amd64
#   aarch64-unknown-linux-musl → dist/mux-agent-arm64
#
# See prompts/docs/release.md for full release notes and decisions.

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-mux-agent:
    name: Build mux-agent (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: mux-agent-amd64
          - target: aarch64-unknown-linux-musl
            artifact_name: mux-agent-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build mux-agent (cross)
        run: |
          cross build --release --target ${{ matrix.target }} -p mux-agent

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mux-agent dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}

      - name: Verify artifact (non-zero size, executable)
        run: |
          test -x dist/${{ matrix.artifact_name }} || (echo "artifact not executable" && exit 1)
          size=$(stat -c%s dist/${{ matrix.artifact_name }})
          test "$size" -gt 0 || (echo "artifact is zero bytes" && exit 1)
          echo "artifact ok: $size bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build-mux-agent
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten dist directory
        run: |
          # download-artifact v4 puts each artifact in a subdirectory; flatten.
          find dist -mindepth 2 -maxdepth 2 -type f -exec mv {} dist/ \;

      - name: Build mux CLI (native Linux amd64)
        uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p mux

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/mux
            dist/mux-agent-amd64
            dist/mux-agent-arm64
          generate_release_notes: true
